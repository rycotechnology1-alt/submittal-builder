name: Uptime

# Pings web and worker /healthz every 5 minutes. Per step-8-buildplan.md Phase 6
# this is intentionally low-fidelity — a real alerting product would replace
# this, but GitHub Actions is good enough to flag a hard outage during the
# pilot. A failing run notifies the repository's default notification settings.

on:
  schedule:
    # GitHub schedules are best-effort; cron expressions run in UTC. */5 is
    # capped to ~5–15 minutes in practice during peak hours.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping web /api/v1/healthz
        env:
          URL: ${{ vars.WEB_HEALTHZ_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::warning::WEB_HEALTHZ_URL repository variable not set; skipping web ping"
            exit 0
          fi
          status=$(curl --silent --show-error --location --max-time 30 \
            --output /tmp/web.json --write-out '%{http_code}' "$URL" || echo 000)
          echo "web status=$status"
          cat /tmp/web.json || true
          if [ "$status" != "200" ]; then
            echo "::error::Web healthz returned HTTP $status from $URL"
            exit 1
          fi
          # The web healthz also returns { db_ok: true }. Verify it.
          if ! grep -q '"db_ok":true' /tmp/web.json; then
            echo "::error::Web healthz body did not include db_ok:true"
            cat /tmp/web.json
            exit 1
          fi

      - name: Ping worker /healthz
        env:
          URL: ${{ vars.WORKER_HEALTHZ_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::warning::WORKER_HEALTHZ_URL repository variable not set; skipping worker ping"
            exit 0
          fi
          status=$(curl --silent --show-error --location --max-time 30 \
            --output /tmp/worker.json --write-out '%{http_code}' "$URL" || echo 000)
          echo "worker status=$status"
          cat /tmp/worker.json || true
          if [ "$status" != "200" ]; then
            echo "::error::Worker healthz returned HTTP $status from $URL"
            exit 1
          fi
